<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}  اسم المدرسة  {% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #fff;
            color: #1a1a2e;
            line-height: 1.6;
            min-height: 100vh;
        }
        .site-header {
            background: #1a2744;
            color: #fff;
            padding: 1rem 1.5rem;
            position: relative;
        }
        .header-layout {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding-left: 5.5rem;
            min-height: 4.5rem;
        }
        .header-logo {
            position: absolute;
            left: 1rem;
            top: 1rem;
            width: 72px;
            height: auto;
            max-height: 72px;
            object-fit: contain;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px;
        }
        .header-text { flex: 1; }
        .header-republic {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 0.25rem;
        }
        .header-association {
            font-size: 0.8rem;
            opacity: 0.88;
            margin-bottom: 0.35rem;
        }
        .header-school {
            font-size: 1.35rem;
            font-weight: 700;
        }
        .header-page-title {
            font-size: 1rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-weight: 600;
        }
        nav.main-nav {
            background: #243352;
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }
        nav.main-nav a {
            color: #fff;
            text-decoration: none;
            padding: 0.85rem 1.25rem;
            font-weight: 600;
            transition: background 0.15s;
        }
        nav.main-nav a:hover,
        nav.main-nav a.active {
            background: #2d4263;
        }
        main.container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            align-items: center;
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: #1a2744; color: #fff; }
        .btn-primary:hover { background: #243352; }
        .btn-secondary { background: #e8ecf1; color: #1a2744; }
        .btn-secondary:hover { background: #d5dce6; }
        .btn-danger { background: #8b2635; color: #fff; }
        .btn-danger:hover { background: #6d1e2a; }
        .btn-warning { background: #b8860b; color: #fff; }
        .btn-warning:hover { background: #966f09; }
        .btn-sm { padding: 0.35rem 0.65rem; font-size: 0.85rem; }
        table.data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }
        table.data-table th,
        table.data-table td {
            padding: 0.65rem 0.75rem;
            text-align: right;
            border: 1px solid #d5dce6;
        }
        table.data-table th {
            background: #e8ecf1;
            font-weight: 700;
            color: #1a2744;
        }
        table.data-table tbody tr:nth-child(even) { background: #f7f9fb; }
        table.data-table tbody tr:hover { background: #eef2f7; }
        .card {
            background: #f7f9fb;
            border: 1px solid #d5dce6;
            border-radius: 6px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }
        .card h2, .card h3 {
            margin-bottom: 1rem;
            color: #1a2744;
            font-size: 1.1rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.35rem;
            font-weight: 600;
            color: #1a2744;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.5rem 0.65rem;
            border: 1px solid #c5cdd8;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-actions {
            margin-top: 1.25rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        .alert-error { background: #fde8ea; color: #8b2635; border: 1px solid #e8b4b8; }
        .alert-info { background: #e8f0fd; color: #1a2744; border: 1px solid #b8cce8; }
        .empty-msg {
            text-align: center;
            padding: 2rem;
            color: #5a6578;
        }
        .inline-form { display: inline; }
        .badge-paid { color: #1e6b3a; font-weight: 700; }
        .badge-unpaid { color: #8b2635; font-weight: 700; }
        .section-title {
            font-size: 1.15rem;
            margin: 1.5rem 0 0.75rem;
            color: #1a2744;
            border-bottom: 2px solid #e8ecf1;
            padding-bottom: 0.35rem;
        }
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .home-card {
            display: block;
            padding: 1.25rem;
            background: #f7f9fb;
            border: 1px solid #d5dce6;
            border-radius: 6px;
            text-decoration: none;
            color: #1a2744;
            font-weight: 700;
            text-align: center;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .home-card:hover {
            border-color: #1a2744;
            box-shadow: 0 2px 8px rgba(26,39,68,0.1);
        }
        @media (max-width: 640px) {
            table.data-table { font-size: 0.85rem; }
            table.data-table th, table.data-table td { padding: 0.45rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <img class="header-logo" src="{{ url_for('static', filename='logo.png.jpg') }}" alt="شعار المدرسة">
        <div class="header-layout">
            <div class="header-text">
                <div class="header-republic">الجمهورية الديمقراطية الشعبية</div>
                <div class="header-association">اسم الجمعية</div>
                <div class="header-page-title">{% block page_title %}{% endblock %}</div>
            </div>
        </div>
    </header>
    <nav class="main-nav">
        <a href="{{ url_for('home') }}" {% if request.endpoint == 'home' %}class="active"{% endif %}>الرئيسية</a>
        <a href="{{ url_for('students') }}" {% if request.endpoint and 'student' in request.endpoint %}class="active"{% endif %}>الطلاب</a>
        <a href="{{ url_for('teachers') }}" {% if request.endpoint and 'teacher' in request.endpoint %}class="active"{% endif %}>المعلمون</a>
        <a href="{{ url_for('classes') }}" {% if request.endpoint and ('class' in request.endpoint or 'schedule' in request.endpoint) %}class="active"{% endif %}>الجداول</a>
        <a href="{{ url_for('payments_home') }}" {% if request.endpoint and 'payment' in request.endpoint %}class="active"{% endif %}>المدفوعات</a>
        <a href="{{ url_for('departs') }}" {% if request.endpoint and 'depart' in request.endpoint or request.endpoint and 'salle' in request.endpoint %}class="active"{% endif %}>المقرات</a>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% block extra_js %}  {% endblock %}
</body>
</html>
