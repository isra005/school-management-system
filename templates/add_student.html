{% extends "base.html" %}

{% block title %}إضافة طالب — مدرسة ورش{% endblock %}
{% block page_title %}إضافة طالب جديد{% endblock %}

{% block content %}
<div class="toolbar">
    <a class="btn btn-secondary" href="{{ url_for('students') }}">إلغاء والعودة</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="post" action="{{ url_for('add_student') }}" id="add-student-form">
        <div class="form-grid">
            <div class="form-group">
                <label for="first_name">الاسم *</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>
            <div class="form-group">
                <label for="last_name">اللقب *</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>
            <div class="form-group">
                <label for="parent_name">اسم الولي *</label>
                <input type="text" id="parent_name" name="parent_name" required>
            </div>
            <div class="form-group">
                <label for="parent_phone">هاتف الولي *</label>
                <input type="tel" id="parent_phone" name="parent_phone" required>
            </div>
            <div class="form-group">
                <label for="address">العنوان</label>
                <input type="text" id="address" name="address">
            </div>
            <div class="form-group">
                <label for="employment_status">الحالة المهنية</label>
                <select id="employment_status" name="employment_status">
                    {% for status in employment_status_options %}
                    <option value="{{ status }}">{{ status }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="category_filter">الفئة</label>
                <select id="category_filter">
                    <option value="">— الكل —</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="class_id">المجموعة *</label>
                <select id="class_id" name="class_id" required>
                    <option value="">— اختر المجموعة —</option>
                    {% for c in classes %}
                    <option value="{{ c.id }}" data-category="{{ c.category_id }}">
                       {{ c.class_name }} — {{ c.category_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="enrolled_date">تاريخ التسجيل *</label>
                <input type="date" id="enrolled_date" name="enrolled_date" required>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">حفظ الطالب</button>
            <a class="btn btn-secondary" href="{{ url_for('students') }}">إلغاء</a>
        </div>
    </form>
</div>
<p style="margin-top:0.5rem;color:#5a6578;font-size:0.9rem;">* حقول إلزامية</p>
{% endblock %}

{% block extra_js %}
<script>
(function () {
    var categoryFilter = document.getElementById('category_filter');
    var classSelect = document.getElementById('class_id');
    if (!categoryFilter || !classSelect) return;

    function filterClasses() {
        var categoryId = categoryFilter.value;
        Array.prototype.forEach.call(classSelect.options, function (opt) {
            if (!opt.value) {
                opt.hidden = false;
                return;
            }
            if (!categoryId) {
                opt.hidden = false;
            } else {
                var optCat = opt.getAttribute('data-category');
                opt.hidden = optCat ? String(optCat) !== String(categoryId) : false;
            }
        });
        var selected = classSelect.options[classSelect.selectedIndex];
        if (selected && selected.hidden) {
            classSelect.value = '';
        }
    }

    categoryFilter.addEventListener('change', filterClasses);
    filterClasses();
})();
</script>
{% endblock %}
