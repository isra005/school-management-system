{% extends "base.html" %}

{% block title %}إضافة أستاذ — مدرسة ورش{% endblock %}
{% block page_title %}إضافة أستاذ جديد{% endblock %}

{% block content %}
<div class="toolbar">
    <a class="btn btn-secondary" href="{{ url_for('teachers') }}">إلغاء والعودة</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="post" action="{{ url_for('add_teacher') }}">
        <div class="form-grid">
            <div class="form-group">
                <label for="category_id">الفئة *</label>
                <select id="category_id" name="category_id" required>
                    <option value="">— اختر الفئة —</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="first_name">الاسم *</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>
            <div class="form-group">
                <label for="last_name">اللقب *</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>
            <div class="form-group">
                <label for="phone">الهاتف</label>
                <input type="tel" id="phone" name="phone">
            </div>
            <div class="form-group">
                <label for="specialty">التخصص</label>
                <input type="text" id="specialty" name="specialty">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">حفظ الأستاذ</button>
            <a class="btn btn-secondary" href="{{ url_for('teachers') }}">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
